<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Net Sales Matrix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

[data-theme="light"]{
  --bg:#ffffff;--bg2:#f8f8f7;--bg3:#f1f0ec;
  --tx:#1a1a18;--tx2:#6b6b68;--tx3:#9b9b98;
  --bd:rgba(0,0,0,0.09);--bde:rgba(0,0,0,0.18);
  --gbg:#eaf3de;--gtx:#3b6d11;--gbd:#c0dd97;
  --abg:#faeeda;--atx:#854f0b;--abd:#fac775;
  --bbg:#e6f1fb;--btx:#185fa5;--bbd:#b5d4f4;
  --rtx:#a32d2d;
  --l1:#eceae4;--l2:#f4f3ef;--l3:#f9f9f7;--l4:#ffffff;--lt:#e4e2db;
  --panel-icon:☀️;
}
[data-theme="dark"]{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --tx:#f0ede8;--tx2:#a8a8a4;--tx3:#6b6b68;
  --bd:rgba(255,255,255,0.09);--bde:rgba(255,255,255,0.18);
  --gbg:#1a2e0a;--gtx:#97c459;--gbd:#3b6d11;
  --abg:#2a1e06;--atx:#ef9f27;--abd:#854f0b;
  --bbg:#0a1e36;--btx:#85b7eb;--bbd:#185fa5;
  --rtx:#f09595;
  --l1:#2e2e2b;--l2:#252523;--l3:#202020;--l4:#1c1c1a;--lt:#363632;
  --panel-icon:🌙;
}

:root{--fs:13px;--hw:224px;--cw:72px;--r:8px;--rlg:12px}

/* Critical: html+body must be 100% so the iframe fills the PBI canvas tile */
html{height:100%;width:100%}
body{
  height:100%;width:100%;
  display:flex;flex-direction:column;
  font-family:'DM Sans',system-ui,sans-serif;
  font-size:var(--fs);color:var(--tx);background:var(--bg);
  transition:background .2s,color .2s;
  overflow:hidden;
}

/* ── toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 7px;border-bottom:.5px solid var(--bd);flex-shrink:0}
.t-left{display:flex;align-items:center;gap:8px}
.vis-title{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--tx)}
.mpill{font-size:11px;font-weight:500;padding:2px 10px;border-radius:20px;background:var(--bbg);color:var(--btx);border:.5px solid var(--bbd)}
.gear-btn{display:flex;align-items:center;gap:5px;background:transparent;border:.5px solid var(--bde);border-radius:var(--r);padding:5px 10px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:inherit;transition:background .12s,color .12s}
.gear-btn:hover{background:var(--bg2);color:var(--tx)}
.gear-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ── table wrapper — flex-grow fills remaining height after toolbar ── */
.t-wrap{overflow:auto;flex:1;min-height:0}
table{border-collapse:collapse;width:max-content;min-width:100%;table-layout:fixed}
th,td{padding:0}
thead{position:sticky;top:0;z-index:10}

/* ── header cells ── */
.th-h{position:sticky;left:0;z-index:12;background:var(--bg2);min-width:var(--hw);max-width:var(--hw);width:var(--hw);padding:5px 8px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--tx3);border-right:.5px solid var(--bde);border-bottom:.5px solid var(--bde)}
.th-g{text-align:center;font-size:11px;font-weight:500;padding:5px 3px;border-right:.5px solid var(--bde);border-bottom:.5px solid var(--bd)}
.th-g.pl{background:var(--bg2);color:var(--tx2)}
.th-g.gm{background:var(--bbg);color:var(--btx)}
.th-g.gh{background:var(--abg);color:var(--atx)}
.th-g.gf{background:var(--gbg);color:var(--gtx)}
.th-s{text-align:center;font-size:10px;padding:3px 2px;background:var(--bg2);color:var(--tx3);border-right:.5px solid var(--bd);border-bottom:.5px solid var(--bde)}
.th-s.cy{color:var(--tx);font-weight:500;font-size:11px}
.th-s.le{border-right:.5px solid var(--bde)}
.th-s.sm{background:color-mix(in srgb,var(--bg2) 65%,var(--bbg) 35%)}
.th-s.sh{background:color-mix(in srgb,var(--bg2) 65%,var(--abg) 35%)}
.th-s.sf{background:color-mix(in srgb,var(--bg2) 65%,var(--gbg) 35%)}

/* ── sticky hierarchy column ── */
.col-h{position:sticky;left:0;z-index:5;min-width:var(--hw);max-width:var(--hw);width:var(--hw);border-right:.5px solid var(--bde);border-bottom:.5px solid var(--bd);overflow:hidden}
.h-in{display:flex;align-items:center;gap:4px;padding:5px 8px;height:100%}
.h-lb{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:var(--fs)}
.xb{background:none;border:none;cursor:pointer;flex-shrink:0;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--tx2);transition:background .1s}
.xb:hover{background:var(--bd)}
.xb svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.lpad{width:18px;flex-shrink:0}

/* ── data cells ── */
.c{text-align:right;padding:5px 7px;font-size:var(--fs);font-variant-numeric:tabular-nums;border-right:.5px solid var(--bd);border-bottom:.5px solid var(--bd);min-width:var(--cw);max-width:var(--cw);width:var(--cw)}
.c.le{border-right:.5px solid var(--bde)}
.c.cm{background:color-mix(in srgb,transparent 55%,var(--bbg) 45%)}
.c.ch{background:color-mix(in srgb,transparent 55%,var(--abg) 45%)}
.c.cf{background:color-mix(in srgb,transparent 55%,var(--gbg) 45%)}
.c.dt{font-size:11px}
.pos{color:var(--gtx)}.neg{color:var(--rtx)}.neu{color:var(--tx3)}
.dash{color:var(--tx3)}

/* ── row level backgrounds ── */
.rl1 .col-h,.rl1 td{background:var(--l1)}
.rl1 .h-lb{font-weight:700;font-size:13px}
.rl1 .c.cm{background:color-mix(in srgb,var(--l1) 50%,var(--bbg) 50%)}
.rl1 .c.ch{background:color-mix(in srgb,var(--l1) 50%,var(--abg) 50%)}
.rl1 .c.cf{background:color-mix(in srgb,var(--l1) 50%,var(--gbg) 50%)}
.rl2 .col-h,.rl2 td{background:var(--l2)}
.rl2 .h-lb{font-weight:600;font-size:12px}
.rl2 .c.cm{background:color-mix(in srgb,var(--l2) 55%,var(--bbg) 45%)}
.rl2 .c.ch{background:color-mix(in srgb,var(--l2) 55%,var(--abg) 45%)}
.rl2 .c.cf{background:color-mix(in srgb,var(--l2) 55%,var(--gbg) 45%)}
.rl3 .col-h,.rl3 td{background:var(--l3)}
.rl3 .h-lb{font-weight:500;font-size:12px;color:var(--tx2)}
.rl4 .col-h,.rl4 td{background:var(--l4)}
.rl4 .h-lb{font-size:12px;color:var(--tx2)}
.rtot .col-h,.rtot td{background:var(--lt)}
.rtot .h-lb{font-weight:700}
.rtot td{border-top:.5px solid var(--bde)}
.rtot .c.cm{background:color-mix(in srgb,var(--lt) 50%,var(--bbg) 50%)}
.rtot .c.ch{background:color-mix(in srgb,var(--lt) 50%,var(--abg) 50%)}
.rtot .c.cf{background:color-mix(in srgb,var(--lt) 50%,var(--gbg) 50%)}
body.compact .c{padding:3px 7px}
body.compact .h-in{padding:3px 8px}

/* ── settings overlay ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:flex-start;justify-content:flex-end;padding:10px 10px 0 0}
.overlay.open{display:flex}
.panel{background:var(--bg);border:.5px solid var(--bde);border-radius:var(--rlg);width:300px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
.p-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:.5px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:1}
.p-title{font-size:14px;font-weight:600;color:var(--tx)}
.p-close{background:transparent;border:none;cursor:pointer;color:var(--tx2);padding:3px;border-radius:5px;display:flex}
.p-close:hover{background:var(--bg2)}
.p-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.p-body{padding:0 16px 16px}
.sec{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);padding:14px 0 7px}
.sec:first-of-type{padding-top:12px}

/* theme toggle row — special styling */
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;background:var(--bg2);margin-bottom:4px;border:.5px solid var(--bd)}
.theme-lbl{font-size:13px;font-weight:500;color:var(--tx);display:flex;align-items:center;gap:7px}
.theme-icon{font-size:16px;line-height:1}
.theme-toggle{display:flex;gap:4px}
.th-btn{padding:4px 10px;border-radius:6px;border:.5px solid var(--bde);background:transparent;font-size:11px;font-weight:500;color:var(--tx2);cursor:pointer;font-family:inherit;transition:background .12s,color .12s}
.th-btn.active{background:var(--btx);color:#fff;border-color:var(--btx)}

/* font size segmented */
.seg{display:flex;gap:4px;flex-wrap:wrap}
.seg-btn{flex:1;min-width:36px;padding:5px 4px;text-align:center;border:.5px solid var(--bde);border-radius:6px;font-size:12px;background:transparent;color:var(--tx2);cursor:pointer;font-family:inherit;transition:background .1s,color .1s}
.seg-btn:hover{background:var(--bg2)}
.seg-btn.on{background:var(--bbg);color:var(--btx);border-color:var(--bbd);font-weight:500}

/* column chips */
.chips{display:flex;flex-direction:column;gap:1px}
.chip{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;border:.5px solid transparent;transition:background .1s}
.chip:hover{background:var(--bg2)}
.chip.on{background:var(--bg2);border-color:var(--bd)}
.chip-lft{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--tx)}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.d-m{background:var(--btx)}.d-q{background:var(--tx3)}.d-h{background:var(--atx)}.d-fy{background:var(--gtx)}

/* pill */
.pill{position:relative;width:38px;height:22px;flex-shrink:0}
.pill input{opacity:0;width:0;height:0;position:absolute}
.pill-tr{position:absolute;inset:0;border-radius:22px;background:var(--bde);cursor:pointer;transition:background .18s}
.pill-tr::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .18s}
.pill input:checked+.pill-tr{background:var(--btx)}
.pill input:checked+.pill-tr::after{transform:translateX(16px)}

/* opt rows */
.opt{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--bd)}
.opt:last-child{border-bottom:none}
.opt-lbl{font-size:13px;color:var(--tx)}
.opt-sub{font-size:11px;color:var(--tx3);margin-top:2px}

/* empty state */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 24px;color:var(--tx3);text-align:center}
.empty svg{width:36px;height:36px;stroke:var(--tx3);fill:none;stroke-width:1.5;stroke-linecap:round}
.empty-title{font-size:14px;font-weight:500;color:var(--tx2)}
.empty-sub{font-size:12px;line-height:1.6;max-width:280px}
</style>
</head>
<body>

<div class="toolbar">
  <div class="t-left">
    <span class="vis-title">Net Sales</span>
    <span class="mpill" id="mpill">—</span>
  </div>
  <button class="gear-btn" onclick="openPanel()" aria-label="Settings">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
    </svg>
    Configure
  </button>
</div>

<div class="t-wrap">
  <table id="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

<!-- settings panel -->
<div class="overlay" id="overlay" onclick="bgClick(event)">
  <div class="panel">
    <div class="p-head">
      <span class="p-title">Display settings</span>
      <button class="p-close" onclick="closePanel()" aria-label="Close">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="p-body">

      <!-- THEME -->
      <div class="sec">Theme</div>
      <div class="theme-row">
        <span class="theme-lbl">
          <span class="theme-icon" id="theme-icon">☀️</span>
          <span id="theme-lbl-text">Light mode</span>
        </span>
        <div class="theme-toggle">
          <button class="th-btn active" id="btn-light" onclick="setTheme('light')">Light</button>
          <button class="th-btn" id="btn-dark" onclick="setTheme('dark')">Dark</button>
        </div>
      </div>

      <!-- FONT SIZE -->
      <div class="sec">Font size</div>
      <div class="seg" id="fs-seg"></div>

      <!-- COLUMNS -->
      <div class="sec">Columns</div>
      <div class="chips" id="col-chips"></div>

      <!-- DISPLAY OPTIONS -->
      <div class="sec">Display options</div>
      <div id="disp-opts"></div>

    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   PERIOD GROUP REGISTRY
   Add new periods here — nothing else needs changing
═══════════════════════════════════════════════ */
const GROUPS = [
  {id:'mon', label:'Month', dotCls:'d-m', hCls:'gm', sCls:'sm', cCls:'cm', keys:['mcy','mpy','md']},
  {id:'q1',  label:'Q1',    dotCls:'d-q', hCls:'pl', sCls:'',   cCls:'',   keys:['q1cy','q1py','q1d']},
  {id:'q2',  label:'Q2',    dotCls:'d-q', hCls:'pl', sCls:'',   cCls:'',   keys:['q2cy','q2py','q2d']},
  {id:'h1',  label:'H1',    dotCls:'d-h', hCls:'gh', sCls:'sh', cCls:'ch', keys:['h1cy','h1py','h1d']},
  {id:'q3',  label:'Q3',    dotCls:'d-q', hCls:'pl', sCls:'',   cCls:'',   keys:['q3cy','q3py','q3d']},
  {id:'q4',  label:'Q4',    dotCls:'d-q', hCls:'pl', sCls:'',   cCls:'',   keys:['q4cy','q4py','q4d']},
  {id:'h2',  label:'H2',    dotCls:'d-h', hCls:'gh', sCls:'sh', cCls:'ch', keys:['h2cy','h2py','h2d']},
  {id:'fy',  label:'FY',    dotCls:'d-fy',hCls:'gf', sCls:'sf', cCls:'cf', keys:['fycy','fypy','fyd']},
];

/* ═══════════════════════════════════════════════
   DISPLAY OPTIONS REGISTRY
   Add new toggles here
═══════════════════════════════════════════════ */
const DISP_OPTS = [
  {key:'grandTotal', lbl:'Grand total row',          sub:'',                              def:true},
  {key:'deltaColor', lbl:'Colour Δ% values',         sub:'Green positive, red negative',  def:true},
  {key:'aggShade',   lbl:'Shade aggregate columns',  sub:'H1, H2, FY',                   def:true},
  {key:'compact',    lbl:'Compact row height',       sub:'',                              def:false},
];

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const S = {
  theme:    'light',
  fontSize: 13,
  vis:      Object.fromEntries(GROUPS.map(g => [g.id, true])),
  opts:     Object.fromEntries(DISP_OPTS.map(o => [o.key, o.def])),
};
const EX = {l1:{}, l2:{}, l3:{}};

let DATA = {month:'—', rows:[]};

/* ═══════════════════════════════════════════════
   DATA LAYER — reads JSON from URL hash
   DAX measure embeds JSON as:
   <iframe src="https://.../#JSONHERE">
   Hash format: {month:"Sep-25", rows:[{l1,l2,l3,l4,mcy,mpy,md,...}]}
═══════════════════════════════════════════════ */
function parseHash(raw) {
  // DAX FORMAT() produces trailing dots on whole numbers e.g. 37201500.
  // which is invalid JSON. Strip them before parsing.
  const clean = raw.replace(/(\d)\.([,}\]])/g, '$1$2');
  return JSON.parse(clean);
}

function loadData() {
  try {
    const hash = decodeURIComponent(window.location.hash.slice(1));
    if (hash && hash.startsWith('{')) {
      DATA = parseHash(hash);
      return;
    }
  } catch(e) { console.warn('Hash parse error', e); }

  // listen for hash changes — fires when slicer changes iframe src
  window.addEventListener('hashchange', () => {
    try {
      const hash = decodeURIComponent(window.location.hash.slice(1));
      if (hash && hash.startsWith('{')) {
        DATA = parseHash(hash);
        render();
      }
    } catch(e) { console.warn('hashchange parse error', e); }
  });
}

/* ═══════════════════════════════════════════════
   FORMATTERS
═══════════════════════════════════════════════ */
const numFmt = new Intl.NumberFormat('en-IN', {maximumFractionDigits:0});
const DASH = '<span class="dash">—</span>';

function fN(v) {
  if (v == null || isNaN(v)) return DASH;
  return numFmt.format(Math.round(v));
}

function fD(v, colour) {
  if (v == null || isNaN(v)) return DASH;
  const pct  = v * 100;
  const sign = pct >= 0 ? '+' : '';
  const txt  = sign + pct.toFixed(1) + '%';
  if (!colour) return `<span class="neu">${txt}</span>`;
  const cls  = pct > 0.05 ? 'pos' : pct < -0.05 ? 'neg' : 'neu';
  return `<span class="${cls}">${txt}</span>`;
}

/* ═══════════════════════════════════════════════
   AGGREGATION — sum CY/PY, recompute delta
═══════════════════════════════════════════════ */
const CY_KEYS = ['mcy','q1cy','q2cy','h1cy','q3cy','q4cy','h2cy','fycy'];
const PY_KEYS = ['mpy','q1py','q2py','h1py','q3py','q4py','h2py','fypy'];
const PFX     = ['m','q1','q2','h1','q3','q4','h2','fy'];

function agg(rows) {
  const r = {};
  [...CY_KEYS, ...PY_KEYS].forEach(k => { r[k] = rows.reduce((s,x) => s+(x[k]||0), 0); });
  PFX.forEach(p => {
    const cy = r[p+'cy'], py = r[p+'py'];
    r[p+'d'] = (py && py !== 0) ? (cy - py) / Math.abs(py) : null;
  });
  return r;
}

/* ═══════════════════════════════════════════════
   TREE BUILD
═══════════════════════════════════════════════ */
function buildTree() {
  const m = {};
  DATA.rows.forEach(r => {
    if (!m[r.l1]) m[r.l1] = {lbl:r.l1, s:r.l1s||0, l2:{}};
    const m2 = m[r.l1].l2;
    if (!m2[r.l2]) m2[r.l2] = {lbl:r.l2, s:r.l2s||0, l3:{}};
    const m3 = m2[r.l2].l3;
    if (!m3[r.l3]) m3[r.l3] = {lbl:r.l3, s:r.l3s||0, rows:[]};
    m3[r.l3].rows.push(r);
  });
  const srt = o => Object.values(o).sort((a,b) => a.s - b.s);
  return srt(m).map(n1 => ({...n1, l2: srt(n1.l2).map(n2 => ({...n2, l3: srt(n2.l3)}))}));
}

/* ═══════════════════════════════════════════════
   RENDER HELPERS
═══════════════════════════════════════════════ */
const vg = () => GROUPS.filter(g => S.vis[g.id]);

function renderCells(row) {
  return vg().map((g, gi, arr) => {
    const [cyk, pyk, dk] = g.keys;
    const last = gi === arr.length - 1;
    const cc   = S.opts.aggShade ? g.cCls : '';
    const le   = last ? ' le' : '';
    return `<td class="c ${cc}">${fN(row[cyk])}</td>`
         + `<td class="c ${cc}">${fN(row[pyk])}</td>`
         + `<td class="c dt ${cc}${le}">${fD(row[dk], S.opts.deltaColor)}</td>`;
  }).join('');
}

function chevron(open) {
  return open
    ? `<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>`
    : `<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`;
}

function esc(s) { return String(s).replace(/'/g, "\\'"); }
function he(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ═══════════════════════════════════════════════
   RENDER HEADER
═══════════════════════════════════════════════ */
function renderHeader() {
  const v = vg();
  let r1 = `<tr><th class="th-h" rowspan="2">Brand hierarchy</th>`;
  v.forEach(g => {
    const lbl = g.id === 'mon' ? (DATA.month || '—') : g.label;
    r1 += `<th class="th-g ${g.hCls}" colspan="3">${lbl}</th>`;
  });
  r1 += '</tr>';
  let r2 = '<tr>';
  v.forEach((g, gi) => {
    const last = gi === v.length - 1;
    r2 += `<th class="th-s cy ${g.sCls}">CY</th>`
        + `<th class="th-s ${g.sCls}">PY</th>`
        + `<th class="th-s ${g.sCls}${last?' le':''}">&#916;%</th>`;
  });
  return r1 + r2 + '</tr>';
}

/* ═══════════════════════════════════════════════
   RENDER BODY
═══════════════════════════════════════════════ */
function renderBody() {
  if (!DATA.rows.length) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="100">
        <div class="empty">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <div class="empty-title">Waiting for data</div>
          <div class="empty-sub">Change the month slicer or check the HTML Visual measure is wired to this visual's HTML Content field well.</div>
        </div>
      </td></tr>`;
    return;
  }

  const tree = buildTree();
  let html = '';

  tree.forEach(n1 => {
    const id1 = n1.lbl;
    const op1 = EX.l1[id1] !== false;
    const d1  = agg(n1.l2 ? Object.values(n1.l2).flatMap(n2 => Object.values(n2.l3).flatMap(n3 => n3.rows)) : []);
    html += `<tr class="rl1"><td class="col-h"><div class="h-in" style="padding-left:8px">
      <button class="xb" onclick="toggle('l1','${esc(id1)}')">${chevron(op1)}</button>
      <span class="h-lb" title="${he(n1.lbl)}">${he(n1.lbl)}</span>
    </div></td>${renderCells(d1)}</tr>`;
    if (!op1) return;

    n1.l2.forEach(n2 => {
      const id2 = id1+'::'+n2.lbl;
      const op2 = EX.l2[id2] !== false;
      const d2  = agg(Object.values(n2.l3).flatMap(n3 => n3.rows));
      html += `<tr class="rl2"><td class="col-h"><div class="h-in" style="padding-left:26px">
        <button class="xb" onclick="toggle('l2','${esc(id2)}')">${chevron(op2)}</button>
        <span class="h-lb" title="${he(n2.lbl)}">${he(n2.lbl)}</span>
      </div></td>${renderCells(d2)}</tr>`;
      if (!op2) return;

      n2.l3.forEach(n3 => {
        const id3 = id2+'::'+n3.lbl;
        const op3 = EX.l3[id3] !== false;
        const d3  = agg(n3.rows);
        html += `<tr class="rl3"><td class="col-h"><div class="h-in" style="padding-left:44px">
          <button class="xb" onclick="toggle('l3','${esc(id3)}')">${chevron(op3)}</button>
          <span class="h-lb" title="${he(n3.lbl)}">${he(n3.lbl)}</span>
        </div></td>${renderCells(d3)}</tr>`;
        if (!op3) return;

        n3.rows.forEach(leaf => {
          html += `<tr class="rl4"><td class="col-h"><div class="h-in" style="padding-left:60px">
            <span class="lpad"></span>
            <span class="h-lb" title="${he(leaf.l4)}">${he(leaf.l4)}</span>
          </div></td>${renderCells(leaf)}</tr>`;
        });
      });
    });
  });

  if (S.opts.grandTotal) {
    const gt = agg(DATA.rows);
    html += `<tr class="rtot"><td class="col-h"><div class="h-in" style="padding-left:8px">
      <span class="lpad"></span><span class="h-lb">Grand total</span>
    </div></td>${renderCells(gt)}</tr>`;
  }

  document.getElementById('tbody').innerHTML = html;
}

function toggle(lv, id) {
  EX[lv][id] = EX[lv][id] === false ? true : false;
  renderBody();
}

/* ═══════════════════════════════════════════════
   FULL RENDER
═══════════════════════════════════════════════ */
function render() {
  document.documentElement.setAttribute('data-theme', S.theme);
  document.documentElement.style.setProperty('--fs', S.fontSize + 'px');
  document.body.classList.toggle('compact', S.opts.compact);
  document.getElementById('mpill').textContent = DATA.month || '—';
  document.getElementById('thead').innerHTML = renderHeader();
  renderBody();
}

/* ═══════════════════════════════════════════════
   SETTINGS PANEL
═══════════════════════════════════════════════ */
function setTheme(t) {
  S.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-icon').textContent   = t === 'dark' ? '🌙' : '☀️';
  document.getElementById('theme-lbl-text').textContent = t === 'dark' ? 'Dark mode' : 'Light mode';
  document.getElementById('btn-light').classList.toggle('active', t === 'light');
  document.getElementById('btn-dark').classList.toggle('active',  t === 'dark');
}

function buildPanel() {
  // font sizes
  document.getElementById('fs-seg').innerHTML =
    [11,12,13,14,15,16].map(sz =>
      `<button class="seg-btn${S.fontSize===sz?' on':''}" onclick="setFs(${sz})">${sz}px</button>`
    ).join('');

  // column chips
  document.getElementById('col-chips').innerHTML = GROUPS.map(g => {
    const lbl = g.id === 'mon' ? `Month (${DATA.month||'—'})` : g.label;
    const on  = S.vis[g.id];
    return `<div class="chip${on?' on':''}">
      <span class="chip-lft"><span class="dot ${g.dotCls}"></span>${lbl}</span>
      <label class="pill"><input type="checkbox" ${on?'checked':''} onchange="toggleCol('${g.id}',this.checked)"><span class="pill-tr"></span></label>
    </div>`;
  }).join('');

  // display options
  document.getElementById('disp-opts').innerHTML = DISP_OPTS.map(o =>
    `<div class="opt">
      <div>
        <div class="opt-lbl">${o.lbl}</div>
        ${o.sub ? `<div class="opt-sub">${o.sub}</div>` : ''}
      </div>
      <label class="pill"><input type="checkbox" ${S.opts[o.key]?'checked':''} onchange="setOpt('${o.key}',this.checked)"><span class="pill-tr"></span></label>
    </div>`
  ).join('');
}

function setFs(sz)        { S.fontSize=sz; render(); buildPanel(); }
function toggleCol(id, v) { S.vis[id]=v;  render(); buildPanel(); }
function setOpt(k, v)     { S.opts[k]=v;  render(); }
function openPanel()      { buildPanel(); document.getElementById('overlay').classList.add('open'); }
function closePanel()     { document.getElementById('overlay').classList.remove('open'); }
function bgClick(e)       { if(e.target===document.getElementById('overlay')) closePanel(); }

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
loadData();
render();
</script>
</body>
</html>
